version: 2
updates:
  # DO NOT REORDER: Dependabot matches top-down. Catch-alls must remain at the bottom.

  # ---- GitHub Actions ------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      actions-all:
        patterns:
          - "*"

  # ---- Backend: .NET (NuGet) -----------------------------------------------
  - package-ecosystem: "nuget"
    directory: "/src/Backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore"
    groups:
      database-drivers:
        patterns:
          - "Microsoft.EntityFrameworkCore.*"
          - "Npgsql.EntityFrameworkCore.PostgreSQL"
          - "Npgsql"
      microsoft-web:
        patterns:
          - "Microsoft.AspNetCore.*"
          - "Microsoft.Extensions.*"
          - "System.*"
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ---- Frontend: Admin (npm) ----------------------------------------------
  - package-ecosystem: "npm"
    directory: "/src/Frontend/apps/admin"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore"
    groups:
      next-react-core:
        patterns:
          - "next"
          - "eslint-config-next"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      dev-tooling:
        patterns:
          - "@types/*"
          - "eslint*"
          - "prettier"
          - "typescript"
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ---- Frontend: Portal (npm) ---------------------------------------------
  - package-ecosystem: "npm"
    directory: "/src/Frontend/apps/portal"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore"
    groups:
      next-react-core:
        patterns:
          - "next"
          - "eslint-config-next"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      dev-tooling:
        patterns:
          - "@types/*"
          - "eslint*"
          - "prettier"
          - "typescript"
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
