name: Frontend CI

on:
  push:
    branches: [main, dotnet]
    paths:
      - "src/Frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "src/Frontend/**"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [admin, portal]
    defaults:
      run:
        working-directory: src/Frontend/apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/Frontend/apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
