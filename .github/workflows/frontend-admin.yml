name: Frontend CI (Admin)

on:
  push:
    branches: [main]
    paths:
      - "src/Frontend/apps/admin/**"
      - ".github/workflows/frontend-admin.yml"
  pull_request:
    paths:
      - "src/Frontend/apps/admin/**"
      - ".github/workflows/frontend-admin.yml"

permissions:
  contents: read

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Frontend/apps/admin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/Frontend/apps/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
