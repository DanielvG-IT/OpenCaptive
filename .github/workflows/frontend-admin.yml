name: Frontend CI (Admin)

on:
  push:
    branches: [main]
    paths:
      - "src/Frontend/apps/admin/**"
      - ".github/workflows/frontend-admin.yml"
  pull_request:
    paths:
      - "src/Frontend/apps/admin/**"
      - ".github/workflows/frontend-admin.yml"

permissions:
  contents: read

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Frontend/apps/admin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/Frontend/apps/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
