name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "src/Backend/**"
      - "OpenCaptive.slnx"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "src/Backend/**"
      - "OpenCaptive.slnx"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore
        run: dotnet restore OpenCaptive.slnx

      - name: Build
        run: dotnet build OpenCaptive.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test OpenCaptive.slnx --configuration Release --no-build --verbosity normal
