name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "src/Backend/**"
      - "OpenCaptive.slnx"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "src/Backend/**"
      - "OpenCaptive.slnx"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore
        run: dotnet restore OpenCaptive.slnx

      - name: Build
        run: dotnet build OpenCaptive.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test OpenCaptive.slnx --configuration Release --no-build --verbosity normal
