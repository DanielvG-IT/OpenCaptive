name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom-backend:
    name: Backend SBOM & SCA
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore
        run: dotnet restore OpenCaptive.slnx

      - name: Prepare artifact directories
        run: mkdir -p artifacts/sbom artifacts/sarif

      - name: Install CycloneDX .NET tool
        run: dotnet tool install --tool-path ./.tools CycloneDX --version 6.2.0

      - name: Generate CycloneDX SBOM
        run: >
          ./.tools/dotnet-CycloneDX OpenCaptive.slnx
          --output artifacts/sbom
          --filename backend.cdx.json
          --output-format Json
          --spec-version 1.6
          --disable-package-restore

      - name: Scan SBOM
        id: sca
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        continue-on-error: true
        with:
          sbom: artifacts/sbom/backend.cdx.json
          output-format: sarif
          output-file: artifacts/sarif/backend.sarif
          severity-cutoff: high
          fail-build: ${{ github.event_name != 'pull_request' }}

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/sarif/backend.sarif
          category: sca-backend

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-backend
          path: artifacts/sbom/backend.cdx.json
          if-no-files-found: error
          retention-days: 30

      - name: Enforce SCA gate
        if: github.event_name != 'pull_request' && steps.sca.outcome == 'failure'
        run: exit 1

  sbom-frontend:
    name: Frontend SBOM & SCA (${{ matrix.app }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: admin
            path: src/Frontend/apps/admin
          - app: portal
            path: src/Frontend/apps/portal
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Prepare artifact directories
        run: mkdir -p artifacts/sbom artifacts/sarif

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ matrix.path }}
          format: cyclonedx-json
          output-file: artifacts/sbom/${{ matrix.app }}.cdx.json
          upload-artifact: false

      - name: Scan SBOM
        id: sca
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        continue-on-error: true
        with:
          sbom: artifacts/sbom/${{ matrix.app }}.cdx.json
          output-format: sarif
          output-file: artifacts/sarif/${{ matrix.app }}.sarif
          severity-cutoff: high
          fail-build: ${{ github.event_name != 'pull_request' }}

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: artifacts/sarif/${{ matrix.app }}.sarif
          category: sca-frontend-${{ matrix.app }}

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-frontend-${{ matrix.app }}
          path: artifacts/sbom/${{ matrix.app }}.cdx.json
          if-no-files-found: error
          retention-days: 30

      - name: Enforce SCA gate
        if: github.event_name != 'pull_request' && steps.sca.outcome == 'failure'
        run: exit 1
