name: SonarQube

on:
  push:
    branches:
      - main
    paths:
      - "src/Backend/**"
      - "src/Frontend/apps/admin/**"
      - "src/Frontend/apps/portal/**"
      - "OpenCaptive.slnx"
      - ".github/workflows/sonarqube.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/Backend/**"
      - "src/Frontend/apps/admin/**"
      - "src/Frontend/apps/portal/**"
      - "OpenCaptive.slnx"
      - ".github/workflows/sonarqube.yml"

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      admin: ${{ steps.filter.outputs.admin }}
      portal: ${{ steps.filter.outputs.portal }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            backend:
              - 'src/Backend/**'
              - 'OpenCaptive.slnx'
            admin:
              - 'src/Frontend/apps/admin/**'
            portal:
              - 'src/Frontend/apps/portal/**'

  api:
    name: Analyze .NET WebAPI
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: "17"
          distribution: zulu

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path "${{ runner.temp }}\scanner" -ItemType Directory -Force
          dotnet tool update dotnet-sonarscanner --tool-path "${{ runner.temp }}\scanner"

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_API }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: powershell
        run: |
          & "${{ runner.temp }}\scanner\dotnet-sonarscanner" begin /k:"DanielvG-IT_OpenCaptive_Api" /o:"danielvanginneken" /d:sonar.token="$env:SONAR_TOKEN" /d:sonar.exclusions="src/Frontend/**,**/Migrations/**" /d:sonar.cpd.exclusions="**/Migrations/**"
          dotnet build OpenCaptive.slnx --configuration Release
          & "${{ runner.temp }}\scanner\dotnet-sonarscanner" end /d:sonar.token="$env:SONAR_TOKEN"

  admin:
    name: Analyze NextJS Admin
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        with:
          projectBaseDir: src/Frontend/apps/admin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_ADMIN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  portal:
    name: Analyze NextJS Portal
    needs: changes
    if: needs.changes.outputs.portal == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        with:
          projectBaseDir: src/Frontend/apps/portal
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_PORTAL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
