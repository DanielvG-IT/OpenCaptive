name: opencaptive

services:
  postgres:
    image: postgres:17
    container_name: opencaptive-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: opencaptive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d opencaptive"]
      interval: 10s
      timeout: 5s
      retries: 5

  papercut:
    image: changemakerstudiosus/papercut-smtp:latest
    container_name: opencaptive-papercut
    restart: unless-stopped

    ports:
      - "25:25"
      - "37408:80"

  seq:
    image: datalust/seq:latest
    container_name: opencaptive-seq
    restart: unless-stopped

    environment:
      ACCEPT_EULA: "Y"

    ports:
      - "5341:5341"
      - "8081:80"

    volumes:
      - seq-data:/data

volumes:
  postgres-data:
  seq-data: